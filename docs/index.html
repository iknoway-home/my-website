<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Personal Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      overflow: hidden;
    }
    #loader {
      text-align: center;
      color: #fff;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    #loader.fade-out { opacity: 0; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); }

    /* View Transitions — cross-document */
    @view-transition { navigation: auto; }
    ::view-transition-old(root) { animation: 300ms ease-out both vt-fade-out; }
    ::view-transition-new(root) { animation: 400ms ease-in  both vt-fade-in; }
    @keyframes vt-fade-out { to   { opacity: 0; } }
    @keyframes vt-fade-in  { from { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      ::view-transition-old(root), ::view-transition-new(root) { animation: none; }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
  <script src="router.js"></script>
</body>
</html>
