<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iKnoWay — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Sparkle canvas ── -->
  <canvas id="sparkle-canvas" aria-hidden="true"></canvas>

  <!-- ── Navigation ── -->
  <header class="site-header" id="site-header">
    <nav class="nav-inner">
      <span class="nav-logo">iKnoWay</span>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#anime">Anime</a></li>
        <li><a href="#movies">Movies</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <a href="../../index.html?switch=1" class="nav-switch">GACHA</a>
    </nav>
  </header>

  <!-- ── Hero ── -->
  <section class="hero" id="top">
    <div class="hero-deco" aria-hidden="true">
      <span class="deco-star s1">+</span>
      <span class="deco-star s2">+</span>
      <span class="deco-star s3">+</span>
      <span class="deco-star s4">+</span>
      <span class="deco-star s5">+</span>
    </div>
    <div class="hero-inner">
      <div class="hero-badge">PROFILE CARD</div>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-role" id="hero-role"></p>
      <p class="hero-tagline" id="hero-tagline"></p>
      <div class="hero-stats" id="hero-stats"></div>
      <a href="#anime" class="btn-primary">My Favorites</a>
    </div>
  </section>

  <!-- ── About ── -->
  <section class="section" id="about">
    <div class="container">
      <div class="section-label reveal">
        <span class="label-num">01</span>
        <span class="label-text">About</span>
      </div>
      <div class="about-card reveal">
        <div class="about-avatar">
          <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FF6B9D"/>
                <stop offset="100%" stop-color="#7EC8E3"/>
              </linearGradient>
            </defs>
            <circle cx="60" cy="45" r="28" fill="url(#ag)" opacity="0.7"/>
            <ellipse cx="60" cy="100" rx="38" ry="24" fill="url(#ag)" opacity="0.5"/>
            <circle cx="50" cy="42" r="5" fill="#fff" opacity="0.9"/>
            <circle cx="70" cy="42" r="5" fill="#fff" opacity="0.9"/>
            <circle cx="52" cy="43" r="2.5" fill="#2D3436"/>
            <circle cx="72" cy="43" r="2.5" fill="#2D3436"/>
            <circle cx="56" cy="40" r="1.5" fill="#fff"/>
            <circle cx="76" cy="40" r="1.5" fill="#fff"/>
            <path d="M 54 53 Q 60 58 66 53" stroke="#FF6B9D" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="about-info">
          <div id="about-paragraphs"></div>
          <ul class="about-facts" id="about-facts"></ul>
        </div>
        <div class="about-traits" id="trait-grid"></div>
      </div>
    </div>
  </section>

  <!-- ── Anime ── -->
  <section class="section section-alt" id="anime">
    <div class="container">
      <div class="section-label reveal">
        <span class="label-num">02</span>
        <span class="label-text">Anime</span>
      </div>
      <div class="card-grid" id="anime-grid"></div>
    </div>
  </section>

  <!-- ── Movies ── -->
  <section class="section" id="movies">
    <div class="container">
      <div class="section-label reveal">
        <span class="label-num">03</span>
        <span class="label-text">Movies</span>
      </div>
      <div class="card-grid" id="movies-grid"></div>
    </div>
  </section>

  <!-- ── Contact ── -->
  <section class="section section-alt" id="contact">
    <div class="container contact-wrap">
      <div class="section-label reveal">
        <span class="label-num">04</span>
        <span class="label-text">Contact</span>
      </div>
      <div class="speech-bubble reveal">
        <p id="contact-message"></p>
        <div class="social-links" id="contact-social"></div>
      </div>
    </div>
    <footer class="site-footer">
      <p>iKnoWay &copy; 2026</p>
      <a href="../../index.html?switch=1" class="footer-switch">GACHA</a>
    </footer>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/SplitText.min.js"></script>
  <script src="../../shared/utils.js"></script>
  <script src="../../shared/data.js"></script>
  <script src="../../shared/snap.js"></script>
  <script src="script.js"></script>
</body>
</html>
